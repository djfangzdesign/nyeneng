name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with: { bun-version: latest }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify critical dependencies
        run: |
          for pkg in react react-dom react-router-dom react-helmet-async lucide-react vite; do
            test -f "node_modules/$pkg/package.json" \
              && echo "OK $pkg" \
              || (echo "MISSING $pkg" && exit 1)
          done

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          ls -la dist/
          test -f dist/index.html
          test -f dist/404.html
          test -f dist/CNAME
          test -f dist/sitemap.xml
          test -f dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
